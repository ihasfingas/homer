---
title: "Homer"
subtitle: "IHASFINGAS"
logo: "logo.png"

header: false
footer: false

stylesheet:
  - "assets/custom.css"

columns: "3" # You can change this to any number that is a factor of 12: (1, 2, 3, 4, 6, 12)
theme: default
colors:
  light:
    highlight-primary: "#fff5f2"
    highlight-secondary: "#fff5f2"
    highlight-hover: "#bebebe"
    background: "#12152B"
    card-background: "#fff5f2"
    text: "#ffffff"
    text-header: "#fafafa"
    text-title: "#000000"
    text-subtitle: "#111111"
    card-shadow: rgba(0, 0, 0, 0.5)
    link: "#3273dc"
    link-hover: "#c1c1c1"
    background-image: "../assets/wallpaper-light.jpeg" # Change wallpaper.jpeg to the name of your own custom wallpaper!
  dark:
    highlight-primary: "#181C3A"
    highlight-secondary: "#181C3A"
    highlight-hover: "#1F2347"
    background: "#12152B"
    card-background: "#181C3A"
    text: "#eaeaea"
    text-header: "#7C71DD"
    text-title: "#fafafa"
    text-subtitle: "#8B8D9C"
    card-shadow: rgba(0, 0, 0, 0.5)
    link: "#c1c1c1"
    link-hover: "#fafafa"
    background-image: "../assets/wallpaper.jpeg"

services:
  - name: "//Utilities"
    icon: "fas fa-toolbox"
    items:
      - name: "7-Zip"
        subtitle: "Archive tool"
        tag: "utility"
        tagstyle: "is-primary"
      - name: "WinDirStat"
        subtitle: "Disk usage statistics"
        tag: "storage"
        tagstyle: "is-info"
      - name: "Process Explorer"
        subtitle: "Better task manager"
        tag: "sysinternals"
        tagstyle: "is-warning"
      - name: "Sysinternals"
        subtitle: "Windows admin tools"
        tag: "admin"
        tagstyle: "is-danger"
      - name: "LibreOffice"
        subtitle: "Office suite"
        tag: "office"
        tagstyle: "is-success"
      - name: "GIMP"
        subtitle: "Image editing / Photoshop alternative"
        tag: "graphics"
        tagstyle: "is-link"

  - name: "//Editing & Development"
    icon: "fas fa-code"
    items:
      - name: "Notepad++ / Sublime / VSCode"
        subtitle: "Text editor / code editor"
        tag: "editor"
        tagstyle: "is-primary"
      - name: "Bruno"
        subtitle: "API tool"
        tag: "api"
        tagstyle: "is-info"
      - name: "HTTrack"
        subtitle: "Download website"
        tag: "web"
        tagstyle: "is-link"
      - name: "WinMerge"
        subtitle: "Compare folders / files / file contents"
        tag: "diff"
        tagstyle: "is-warning"

  - name: "//Networking"
    icon: "fas fa-network-wired"
    items:
      - name: "Wireshark"
        subtitle: "Network monitoring"
        tag: "network"
        tagstyle: "is-primary"
      - name: "Zenmap"
        subtitle: "Network scan & topology"
        tag: "scanner"
        tagstyle: "is-danger"
      - name: "PuTTY"
        subtitle: "SSH / Telnet client"
        tag: "remote"
        tagstyle: "is-info"
      - name: "FileZilla"
        subtitle: "FTP client"
        tag: "transfer"
        tagstyle: "is-success"

  - name: "//Disk & Imaging"
    icon: "fas fa-hard-drive"
    items:
      - name: "Rufus"
        subtitle: "Create installation media"
        tag: "boot"
        tagstyle: "is-primary"
      - name: "Raspberry Pi Imager"
        subtitle: "Create Raspberry Pi installation media"
        tag: "raspberry-pi"
        tagstyle: "is-danger"
      - name: "Clonezilla"
        subtitle: "Disk cloning"
        tag: "backup"
        tagstyle: "is-warning"

  - name: "//Benchmarks & Monitoring"
    icon: "fas fa-microchip"
    items:
      - name: "CrystalDiskMark"
        subtitle: "Disk benchmark"
        tag: "benchmark"
        tagstyle: "is-primary"
      - name: "AIDA64"
        subtitle: "System benchmark / stress testing"
        tag: "stress"
        tagstyle: "is-danger"
      - name: "CPU-Z"
        subtitle: "CPU information"
        tag: "cpu"
        tagstyle: "is-info"
      - name: "HWiNFO"
        subtitle: "Hardware info / temperatures"
        tag: "monitoring"
        tagstyle: "is-success"
      - name: "OCCT"
        subtitle: "System benchmark / stress testing"
        tag: "stress"
        tagstyle: "is-warning"
      - name: "Prime95"
        subtitle: "CPU benchmark / stress testing"
        tag: "cpu"
        tagstyle: "is-danger"
      - name: "Core Temp"
        subtitle: "CPU temperature monitoring"
        tag: "temp"
        tagstyle: "is-link"
      - name: "Intel XTU"
        subtitle: "CPU overclocking / tuning"
        tag: "oc"
        tagstyle: "is-dark"

  - name: "//Software"
    icon: "fas fa-desktop"
    items:
      - name: "WD Dashboard"
        subtitle: "Western Digital drive management"
        tag: "storage"
        tagstyle: "is-primary"
      - name: "qBittorrent"
        subtitle: "Torrent client"
        tag: "torrent"
        tagstyle: "is-info"
      - name: "Steam"
        subtitle: "Game platform"
        tag: "gaming"
        tagstyle: "is-link"
      - name: "VLC"
        subtitle: "Media player"
        tag: "media"
        tagstyle: "is-success"
      - name: "NVIDIA Driver"
        subtitle: "GPU driver software"
        tag: "driver"
        tagstyle: "is-warning"
      - name: "Logitech G HUB"
        subtitle: "Logitech device management"
        tag: "peripherals"
        tagstyle: "is-danger"

  - name: "//Useful Links"
    icon: "fas fa-link"
    items:
      - name: "QuickRef"
        subtitle: "Cheatsheets"
        tag: "reference"
        tagstyle: "is-primary"
        url: "https://quickref.me/"
        target: "_blank"
      - name: "IT Tools"
        subtitle: "Handy tools for developers"
        tag: "tools"
        tagstyle: "is-info"
        url: "https://it-tools.tech/"
        target: "_blank"
  - name: "//Learn"
    icon: "fas fa-graduation-cap"
    items:
      - name: "LearnCpp"
        subtitle: "Complete C++ tutorial (beginner → advanced)"
        tag: "cpp"
        tagstyle: "is-primary"
        url: "https://www.learncpp.com/"
        target: "_blank"

      - name: "StudyPlan C++"
        subtitle: "Structured C++ learning path"
        tag: "cpp"
        tagstyle: "is-info"
        url: "https://www.studyplan.dev/cpp"
        target: "_blank"

      - name: "Hacking C++"
        subtitle: "Modern C++ tips & best practices"
        tag: "cpp"
        tagstyle: "is-warning"
        url: "https://hackingcpp.com/"
        target: "_blank"

      - name: "cppreference"
        subtitle: "C++ technical reference (advanced)"
        tag: "reference"
        tagstyle: "is-danger"
        url: "https://www.cppreference.com/"
        target: "_blank"

      - name: "The Rust Book"
        subtitle: "Official Rust documentation"
        tag: "rust"
        tagstyle: "is-primary"
        url: "https://doc.rust-lang.org/book/"
        target: "_blank"

      - name: "Rustfinity"
        subtitle: "Rust practice challenges"
        tag: "rust"
