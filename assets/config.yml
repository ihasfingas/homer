        url: "https://www.rustfinity.com/practice/rust/challenges/printing-hello-world"
        target: "_blank"

      - name: "Coddy Rust Journey"
        subtitle: "Rust fundamentals learning path"
        tag: "rust"
        tagstyle: "is-info"
        url: "https://coddy.tech/journeys/rust/fundamentals"
        target: "_blank"

      - name: "TypingClub"
        subtitle: "Typing practice"
        tag: "typing"
        tagstyle: "is-link"
        url: "https://www.typingclub.com/"
